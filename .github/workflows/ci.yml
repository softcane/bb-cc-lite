name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.x
          - 22.x

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke packaged CLI
        shell: bash
        run: |
          set -euo pipefail
          pack_dir="$(mktemp -d)"
          npm pack --pack-destination "$pack_dir"
          tarball="$(find "$pack_dir" -name 'bb-cc-lite-*.tgz' -print -quit)"
          npx -y --package "$tarball" bb-cc-lite --help

      - name: Smoke install, hooks, statusline, why, doctor, uninstall
        shell: bash
        run: |
          set -euo pipefail
          qa_root="$(mktemp -d)"
          mkdir -p "$qa_root/project" "$qa_root/home" "$qa_root/app"
          export BB_CC_LITE_HOME="$qa_root/app"
          export BB_CC_LITE_STORE="$qa_root/app/events.json"

          node dist/cli.js install --scope local --project "$qa_root/project" --home "$qa_root/home" --hooks
          printf '%s\n' '{"session_id":"ci-smoke","hook_event_name":"PostToolUseFailure","tool_name":"Bash","tool_input":{"command":"npm test"}}' | node dist/cli.js hook --bb-cc-lite-hook PostToolUseFailure
          printf '%s\n' '{"session_id":"ci-smoke","hook_event_name":"PostToolUseFailure","tool_name":"Bash","tool_input":{"command":"npm test"}}' | node dist/cli.js hook --bb-cc-lite-hook PostToolUseFailure
          printf '%s\n' '{"session_id":"ci-smoke","model":{"id":"claude-sonnet-4-5"},"terminal_width":140}' | node dist/cli.js statusline
          node dist/cli.js why --session ci-smoke
          node dist/cli.js doctor --scope local --project "$qa_root/project" --home "$qa_root/home"
          node dist/cli.js uninstall --scope local --project "$qa_root/project" --home "$qa_root/home"
          test ! -e "$qa_root/project/.claude/settings.local.json"
