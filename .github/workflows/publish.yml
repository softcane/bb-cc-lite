name: Publish

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    if: github.repository == 'softcane/bb-cc-lite'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check release tag
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          if [[ "${GITHUB_REF_NAME}" != "v${version}" ]]; then
            echo "::error::Release tag ${GITHUB_REF_NAME} does not match package version v${version}"
            exit 1
          fi

      - name: Audit dependency signatures
        run: npm audit signatures

      - name: Run release gate
        run: npm run prepublishOnly

      - name: Smoke packaged CLI
        shell: bash
        run: |
          set -euo pipefail
          pack_dir="$(mktemp -d)"
          npm pack --pack-destination "$pack_dir"
          tarball="$(find "$pack_dir" -name 'bb-cc-lite-*.tgz' -print -quit)"
          npx -y --package "$tarball" bb-cc-lite --help

      - name: Publish to npm
        run: npm publish --access public --ignore-scripts
